<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第一建設</title>
    <meta
      name="description"
      content="企画から実装まで一気通貫で支援するWeb制作スタジオ"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="is-loading">
    <div class="opening" aria-hidden="true">
      <div class="opening__frame">
        <span class="opening__bgfade" aria-hidden="true"></span>
        <span class="opening__bar"></span>
        <span class="opening__blur"></span>
        <span class="opening__overlay"></span>
        <span class="opening__ippo"></span>
        <span class="opening__panel"></span>
        <span class="opening__line opening__line--1"></span>
        <span class="opening__line opening__line--2"></span>
        <span class="opening__line opening__line--3"></span>
        <span class="opening__copy opening__copy--1"></span>
        <span class="opening__copy opening__copy--2"></span>
        <span class="opening__copy opening__copy--3"></span>
        <span class="opening__logo"></span>
        <div class="opening__controller" data-opening-controller>
          <div class="opening__controller-row">
            <button type="button" data-opening-play>再生</button>
            <button type="button" data-opening-pause>停止</button>
            <button type="button" data-opening-back>戻す</button>
            <button type="button" data-opening-step>コマ送り</button>
            <button type="button" data-opening-reload>再読込</button>
          </div>
          <div class="opening__controller-row">
            <input
              type="text"
              placeholder="停止箇所ラベル"
              data-opening-label-input
            />
            <button type="button" data-opening-label-add>ラベル追加</button>
            <button type="button" data-opening-label-clear>全クリア</button>
          </div>
          <div class="opening__controller-row">
            <label>
              <input type="checkbox" data-opening-stop-after />
              オープニング後に停止
            </label>
          </div>
          <div class="opening__controller-list" data-opening-label-list></div>
          <div class="opening__controller-scrub">
            <input type="range" min="0" max="1000" value="0" data-opening-scrub />
          </div>
        </div>
      </div>
    </div>
    <div class="design-screen" aria-hidden="true">
      <div class="post-layout">
        <header class="post-layout__header">
          <img src="img/header.png?v=20260313-1" alt="" />
        </header>

        <section class="project-block">
          <h2 class="project-block__title">
            <img src="img/project_h.png" alt="Project" />
          </h2>

          <div class="carousel carousel--left" aria-label="Project carousel top">
            <div class="carousel__track">
              <div class="carousel__group">
                <img src="img/p01.png" alt="" />
                <img src="img/p02.png" alt="" />
              </div>
              <div class="carousel__group" aria-hidden="true">
                <img src="img/p01.png" alt="" />
                <img src="img/p02.png" alt="" />
              </div>
            </div>
          </div>

          <div class="carousel carousel--right" aria-label="Project carousel bottom">
            <div class="carousel__track">
              <div class="carousel__group">
                <img src="img/p04.png" alt="" />
                <img src="img/p05.png" alt="" />
              </div>
              <div class="carousel__group" aria-hidden="true">
                <img src="img/p04.png" alt="" />
                <img src="img/p05.png" alt="" />
              </div>
            </div>
          </div>
        </section>

        <section class="topics-block" aria-label="Topics">
          <img class="topics-block__back" src="img/topics_back.png" alt="" />
          <div class="topics-block__inner">
            <h2 class="topics-block__title">
              <img src="img/topics_title.png" alt="Topics" />
            </h2>
            <div class="topics-block__grid">
              <img src="img/topics4.png" alt="" />
              <img src="img/topics3.png" alt="" />
              <img src="img/topics2.png" alt="" />
              <img src="img/topics1.png" alt="" />
            </div>
          </div>
        </section>

        <section class="contents-block" aria-label="Business and Company">
          <article class="contents-card contents-card--business">
            <img class="contents-card__back" src="img/contents_back.png" alt="" />
            <div class="contents-card__body">
              <img class="contents-card__title" src="img/business_title.png" alt="Our Business" />
              <img class="contents-card__image" src="img/business_img.png" alt="" />
              <img class="contents-card__text" src="img/business_txt.png" alt="" />
            </div>
          </article>

          <article class="contents-card contents-card--company">
            <img class="contents-card__back" src="img/contents_back.png" alt="" />
            <div class="contents-card__body">
              <img class="contents-card__title" src="img/company_title.png" alt="Company" />
              <img class="contents-card__image" src="img/company_img.png" alt="" />
              <img class="contents-card__text" src="img/company_txt.png" alt="" />
            </div>
          </article>
        </section>

        <section class="contact-block" aria-label="Contact">
          <img src="img/contact.png?v=20260313-1" alt="Contact" />
        </section>

        <footer class="footer-block" aria-label="Footer">
          <img src="img/footer.png?v=20260313-1" alt="Footer" />
        </footer>
      </div>
    </div>

    <script src="opening-controller.js"></script>
    <script src="script.js"></script>
  </body>
</html>
